name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

  build-and-deploy:
    name: Build & Deploy
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:${{ github.sha }}

  deploy-to-ec2:
        needs: build-and-deploy
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_SSH_KEY }}

                script: |
                    docker pull ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:latest
                    docker stop techflow-api || true
                    docker rm techflow-api || true

                    docker run -d \
                        --name techflow-api \
                        -p 3000:3000 \
                        ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:latest

                    sleep 15

                    docker exec techflow-api /app/scripts/health-check.sh

                    if [ $? -ne 0 ]; then
                        echo "Health check failed. Starting rollback..."
                        
                        docker stop techflow-api || true
                        docker rm techflow-api || true

                        docker pull ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:previous

                        docker run -d --name techflow-api -p 3000:3000 ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:previous

                        echo "Rollback Successful"
                    fi

                    echo "Deployment Successful" 
  
  notify:
        needs: deploy-to-ec2
        runs-on: ubuntu-latest
        if: always()

        steps:
            - name: Set deploy status message
              id: status
              run: |
                if [ "${{ needs.deploy-to-ec2.result }}" == "success" ]; then
                echo "STATUS=✅ SUCCESS" >> $GITHUB_OUTPUT
                echo "MESSAGE=succeeded" >> $GITHUB_OUTPUT
                else
                echo "STATUS=❌ FAILED" >> $GITHUB_OUTPUT
                echo "MESSAGE=failed" >> $GITHUB_OUTPUT
                fi
            - name: Send Gmail notification
              uses: dawidd6/action-send-mail@v3
              env:
                BRANCH: ${{ github.ref_name }}
              with:
                server_address: smtp.gmail.com
                server_port: 465
                secure: true
                username: ${{ secrets.GMAIL_SENDER }}
                password: ${{ secrets.GMAIL_APP_PASSWORD }}
                to: ${{ secrets.NOTIFY_EMAIL }}
                from: TechFlow CI/CD <${{ secrets.GMAIL_SENDER }}>
                subject: "[${{ steps.status.outputs.STATUS }}] TechFlow Deploy - ${{ github.ref_name }}"
                html_body: |
                    <div style="max-width:580px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

                        <!-- Header -->
                        <div style="background:#0f0f0f;border-radius:12px 12px 0 0;padding:28px 32px;display:flex;align-items:center;gap:14px;">
                        <div style="width:40px;height:40px;border-radius:8px;background:#1a1a1a;border:0.5px solid #333;display:flex;align-items:center;justify-content:center;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                        <div>
                            <p style="font-size:15px;font-weight:500;color:#fff;margin:0;">TechFlow CI/CD</p>
                            <p style="font-size:12px;color:#888;margin:2px 0 0;">Deployment notification</p>
                        </div>
                        </div>

                        <!-- Body -->
                        <div style="background:#fff;border:0.5px solid #e5e5e5;border-top:none;padding:28px 32px;">

                        <!-- Status banner -->
                        ${{ steps.status.outputs.STATUS == '✅ SUCCESS' && '
                        <div style="background:#eaf3de;border:0.5px solid #639922;border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:24px;">
                            <div style="width:8px;height:8px;border-radius:50%;background:#3b6d11;flex-shrink:0;"></div>
                            <span style="font-size:14px;font-weight:500;color:#27500a;">Deployment succeeded on ${{ github.ref_name }}</span>
                        </div>' || '
                        <div style="background:#fcebeb;border:0.5px solid #e24b4a;border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:24px;">
                            <div style="width:8px;height:8px;border-radius:50%;background:#a32d2d;flex-shrink:0;"></div>
                            <span style="font-size:14px;font-weight:500;color:#791f1f;">Deployment ${{ steps.status.outputs.MESSAGE }} on ${{ github.ref_name }}</span>
                        </div>'}}

                        <!-- Meta grid -->
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
                            <div style="background:#f7f7f5;border-radius:8px;padding:12px 14px;">
                            <p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin:0 0 4px;">Commit</p>
                            <p style="font-size:13px;font-weight:500;color:#1a1a1a;margin:0;font-family:monospace;">${{ github.sha }}</p>
                            </div>
                            <div style="background:#f7f7f5;border-radius:8px;padding:12px 14px;">
                            <p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin:0 0 4px;">Branch</p>
                            <p style="font-size:13px;font-weight:500;color:#1a1a1a;margin:0;font-family:monospace;">${{ github.ref_name }}</p>
                            </div>
                            <div style="background:#f7f7f5;border-radius:8px;padding:12px 14px;">
                            <p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin:0 0 4px;">Triggered by</p>
                            <p style="font-size:13px;font-weight:500;color:#1a1a1a;margin:0;">${{ github.actor }}</p>
                            </div>
                            <div style="background:#f7f7f5;border-radius:8px;padding:12px 14px;">
                            <p style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin:0 0 4px;">Run ID</p>
                            <p style="font-size:13px;font-weight:500;color:#1a1a1a;margin:0;font-family:monospace;">${{ github.run_id }}</p>
                            </div>
                        </div>

                        <hr style="height:0.5px;background:#e5e5e5;border:none;margin:24px 0;">

                        <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                            style="display:inline-block;background:#1a1a1a;color:#fff;text-decoration:none;padding:11px 20px;border-radius:8px;font-size:13px;font-weight:500;">
                            View pipeline run →
                        </a>
                        </div>

                        <!-- Footer -->
                        <div style="background:#f7f7f5;border:0.5px solid #e5e5e5;border-top:none;border-radius:0 0 12px 12px;padding:16px 32px;display:flex;justify-content:space-between;">
                        <span style="font-size:11px;color:#999;">TechFlow · GitHub Actions</span>
                        <span style="font-size:11px;color:#999;">${{ github.repository }}</span>
                        </div>

                    </div>                  