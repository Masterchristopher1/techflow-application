name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

  build-and-deploy:
    name: Build & Deploy
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:${{ github.sha }}

  deploy-to-ec2:
        needs: build-and-deploy
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_SSH_KEY }}

                script: |
                    docker pull ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:latest
                    docker stop techflow-api || true
                    docker rm techflow-api || true

                    docker run -d \
                        --name techflow-api \
                        -p 3000:3000 \
                        ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:latest

                    sleep 15

                    docker exec techflow-api /app/scripts/health-check.sh

                    if [ $? -ne 0 ]; then
                        echo "Health check failed. Starting rollback..."
                        
                        docker stop techflow-api || true
                        docker rm techflow-api || true

                        docker pull ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:previous

                        docker run -d --name techflow-api -p 3000:3000 ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:previous

                        echo "Rollback Successful"
                    fi

                    echo "Deployment Successful" 